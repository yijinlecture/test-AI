name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # package-lock.json을 기준으로 깔끔하게 설치

      - name: Build (Check Environment Variables)
        run: npm run build
        env:
          # 사용하는 코드에 따라 둘 다 넣어주는 것이 안전합니다.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist # 빌드 후 생성되는 폴더명이 dist가 맞는지 꼭 확인!

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
